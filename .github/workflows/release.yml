name: Release

# Builds release binaries when a v* tag is pushed and attaches them to the
# GitHub release. Create the release first (gh release create vX.Y.Z --notes
# ...); the resulting tag push triggers this workflow, which uploads assets
# onto that release.

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Verify tag matches Cargo.toml version
        run: |
          version="$(cargo metadata --format-version 1 --no-deps | jq -r '.packages[0].version')"
          if [ "v$version" != "$GITHUB_REF_NAME" ]; then
            echo "Tag $GITHUB_REF_NAME does not match Cargo.toml version $version" >&2
            exit 1
          fi
      - name: Build
        run: cargo build --release --target "${{ matrix.target }}"
      - name: Package
        run: >
          tar -C "target/${{ matrix.target }}/release" -czf
          "repo-scout-$GITHUB_REF_NAME-${{ matrix.target }}.tar.gz" repo-scout
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$GITHUB_REF_NAME" "repo-scout-$GITHUB_REF_NAME-${{ matrix.target }}.tar.gz" --clobber
